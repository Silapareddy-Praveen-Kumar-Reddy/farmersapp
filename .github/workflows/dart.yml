# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Use the Flutter setup action instead of Dart setup
      - uses: subosito/flutter-action@v2 # This action sets up the Flutter SDK (which includes Dart)
        with:
          flutter-version: '3.x.x' # Specify your Flutter version, e.g., '3.19.x' or '3.22.x'
          channel: 'stable'       # Or 'beta', 'master'

      - name: Install dependencies
        run: flutter pub get # Use flutter pub get for Flutter projects

      # Uncomment this step to verify the use of 'flutter format' on each commit.
      # - name: Verify formatting
      #   run: flutter format --output=none --set-exit-if-changed .

      # Consider passing '--fatal-infos' for slightly stricter analysis.
      - name: Analyze project source
        run: flutter analyze # Use flutter analyze for Flutter projects

      # Your project will need to have tests in test/ and a dependency on
      # package:test for this step to succeed.
      - name: Run tests
        run: flutter test # Use flutter test for Flutter projects
